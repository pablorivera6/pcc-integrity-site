<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>PCC Integrity — Cathodic Protection Engineering</title>
<link rel="stylesheet" href="styles/tokens.css">
<link rel="stylesheet" href="styles/animations.css">
<style>
  body { min-height: 100vh; background: #fff; }
  * { box-sizing: border-box; }
  input:focus, textarea:focus { border-color: var(--accent) !important; }
  .lucide { display: inline-block; vertical-align: middle; }
  ::selection { background: var(--accent); color: #fff; }
  /* hide scrollbars on filter/tab rows */
  ::-webkit-scrollbar { height: 0; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@0.473.0/dist/umd/lucide.min.js"></script>
</head>
<body>
<div id="root"></div>

<script src="src/content.js?v=13"></script>
<script type="text/babel" src="src/ui.jsx?v=5"></script>
<script type="text/babel" src="src/animations.jsx?v=1"></script>
<script type="text/babel" src="src/Chrome.jsx?v=5"></script>
<script type="text/babel" src="src/CorrosionAnimation.jsx?v=3"></script>
<script type="text/babel" src="src/LogoAnimation.jsx?v=7"></script>
<script type="text/babel" src="src/tweaks-panel.jsx?v=3"></script>
<script type="text/babel" src="src/pages/Home.jsx?v=12"></script>
<script type="text/babel" src="src/pages/About.jsx?v=4"></script>
<script type="text/babel" src="src/pages/Services.jsx?v=4"></script>
<script type="text/babel" src="src/pages/Supply.jsx?v=6"></script>
<script type="text/babel" src="src/pages/Experience.jsx?v=4"></script>
<script type="text/babel" src="src/pages/ESG.jsx?v=5"></script>
<script type="text/babel" src="src/pages/Contact.jsx?v=4"></script>

<script type="text/babel">
const { useState, useEffect } = React;

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "lang": "es",
  "accentHue": "red",
  "headingWeight": 600,
  "density": "comfortable",
  "showStatBand": true
}/*EDITMODE-END*/;

const HUES = {
  red:    { accent:'#d50032', deep:'#b00033', soft:'#fbd5de' },  /* PANTONE 206 C */
  crimson:{ accent:'#9a1a32', deep:'#6f1224', soft:'#eecdd2' },
  rust:   { accent:'#c64b21', deep:'#9a3818', soft:'#f5dccf' },
  steel:  { accent:'#2b4a6b', deep:'#1d3450', soft:'#d3dde7' },
  ink:    { accent:'#14181d', deep:'#000000', soft:'#d9dce1' },
};

function App() {
  const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const [view, setView] = useState(() => {
    const h = window.location.hash.replace('#','');
    return h || 'home';
  });
  const [industryFocus, setIndustryFocus] = useState(null);
  const lang = tweaks.lang;
  const setLang = (l) => setTweak('lang', l);

  // apply tweak overrides as inline CSS variables on root
  useEffect(() => {
    const r = document.documentElement;
    const h = HUES[tweaks.accentHue] || HUES.red;
    r.style.setProperty('--accent', h.accent);
    r.style.setProperty('--accent-deep', h.deep);
    r.style.setProperty('--accent-soft', h.soft);
    document.querySelectorAll('h1,h2,h3').forEach(el => el.style.fontWeight = tweaks.headingWeight);
  }, [tweaks.accentHue, tweaks.headingWeight, view]);

  const onNav = (id) => {
    setView(id);
    window.location.hash = id;
    window.scrollTo({ top: 0, behavior: 'instant' });
  };

  useEffect(() => {
    const onHash = () => setView(window.location.hash.replace('#','') || 'home');
    window.addEventListener('hashchange', onHash);
    return () => window.removeEventListener('hashchange', onHash);
  }, []);

  useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, [view, lang, tweaks]);

  // Re-scan reveal targets on view change
  useAutoReveal([view, lang]);

  const isDarkNav = view === 'home';

  return <div data-screen-label={`PCC Site / ${view}`}>
    <Nav current={view} onNav={onNav} lang={lang} setLang={setLang} dark={false}/>
    {view === 'home'       && <HomePage lang={lang} onNav={onNav} setIndustry={setIndustryFocus}/>}
    {view === 'about'      && <AboutPage lang={lang} onNav={onNav}/>}
    {view === 'services'   && <ServicesPage lang={lang} onNav={onNav} initial={industryFocus}/>}
    {view === 'supply'     && <SupplyPage lang={lang} onNav={onNav}/>}
    {view === 'experience' && <ExperiencePage lang={lang} onNav={onNav}/>}
    {view === 'esg'        && <ESGPage lang={lang} onNav={onNav}/>}
    {view === 'contact'    && <ContactPage lang={lang}/>}
    <Footer lang={lang} onNav={onNav}/>

    <TweaksPanel title="Tweaks">
      <TweakSection title={lang === 'es' ? 'Idioma' : 'Language'}>
        <TweakRadio label={lang === 'es' ? 'Idioma' : 'Language'}
          value={tweaks.lang}
          onChange={v => setTweak('lang', v)}
          options={[{value:'es', label:'ES'}, {value:'en', label:'EN'}]}/>
      </TweakSection>
      <TweakSection title={lang === 'es' ? 'Marca' : 'Brand'}>
        <TweakSelect label={lang === 'es' ? 'Color de acento' : 'Accent color'}
          value={tweaks.accentHue}
          onChange={v => setTweak('accentHue', v)}
          options={[
            {value:'red', label:'PCC Red (default)'},
            {value:'crimson', label:'Crimson (más sobrio)'},
            {value:'rust', label:'Rust (cálido)'},
            {value:'steel', label:'Steel Blue'},
            {value:'ink', label:'Mono / Ink'},
          ]}/>
        <TweakSlider label={lang === 'es' ? 'Peso de títulos' : 'Heading weight'}
          value={tweaks.headingWeight} min={400} max={800} step={100}
          onChange={v => setTweak('headingWeight', v)}/>
      </TweakSection>
    </TweaksPanel>
  </div>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
